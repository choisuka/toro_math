  <div style="font-size:.75rem;color:#94a3b8;margin-bottom:.5rem">

  <div style="display:inline-block;padding:.3rem .9rem;border-radius:999px;background:rgba(125,211,252,.07);border:1px solid rgba(125,211,252,.25);color:#7dd3fc;font-size:.8rem;font-weight:700;margin-bottom:.8rem">

    <div style="font-size:.88rem;color:#e2e8f0;line-height:1.8;font-weight:600">가로가 세로보다 5cm 더 긴 직사각형의 둘레가 30cm입니다. 세로의 길이를 x라 두고 구하세요.</div>
  </div>

  
  <details style="margin-top:1rem">
    <summary style="cursor:pointer;display:inline-block;padding:.6rem 1.6rem;background:linear-gradient(135deg,#86efac,#3b82f6);border:none;border-radius:999px;color:#0f172a;font-weight:700;font-size:.9rem;list-style:none">

      <b style="color:#7dd3fc">풀이:</b> 세로=x, 가로=x+5<br>2(x + x + 5) = 30<br>4x + 10 = 30 → 4x = 20<br><b style="color:#fde68a;font-size:.9rem">세로 5cm, 가로 10cm</b>
