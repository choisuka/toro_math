<body style="margin:0;padding:20px;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center">
<div style="max-width:580px;width:100%;font-family:'Noto Sans KR',sans-serif">

  <div style="font-size:.75rem;color:#94a3b8;margin-bottom:.5rem">
    📚 아르모니아 수학왕국 · 2단계 방정식 · eq-hard 10/11
  </div>

  <div style="display:inline-block;padding:.3rem .9rem;border-radius:999px;background:rgba(253,230,138,.07);border:1px solid rgba(253,230,138,.25);color:#fde68a;font-size:.8rem;font-weight:700;margin-bottom:.8rem">
    ✡️ 심화 10/10 — 나이 응용
  </div>

  <div style="background:rgba(253,230,138,.07);border:1px solid rgba(253,230,138,.25);border-radius:16px;padding:1.4rem 1.6rem;line-height:1.85;font-size:.9rem">
    <div style="font-size:.88rem;color:#e2e8f0;line-height:1.8;font-weight:600">할아버지, 아버지, 아들의 나이 합은 140세입니다. 할아버지는 아버지 나이의 2배이고, 아버지는 아들보다 28살 많습니다. 세 사람의 나이를 각각 구하세요.</div>
  </div>

  
  <details style="margin-top:1rem">
    <summary style="cursor:pointer;display:inline-block;padding:.6rem 1.6rem;background:linear-gradient(135deg,#86efac,#3b82f6);border:none;border-radius:999px;color:#0f172a;font-weight:700;font-size:.9rem;list-style:none">
      ✅ 정답 보기
    </summary>
    <div style="margin-top:.6rem;background:#0f172a;border:1px solid rgba(134,239,172,.2);border-radius:16px;padding:1.2rem 1.6rem;color:#e2e8f0;line-height:1.9;font-size:.9rem">
      <b style="color:#fde68a">풀이:</b> 아들=x<br>아버지=x+28, 할아버지=2(x+28)<br>x+(x+28)+2(x+28)=140 → 4x=56<br><b style="color:#fde68a;font-size:.9rem">아들 14세 / 아버지 42세 / 할아버지 84세</b>
    </div>
  </details>
