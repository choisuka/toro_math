<!DOCTYPE html>

<head>

<title>⚡ 심화 3/4 — x¹⁰⁰−1 나누기 — 아르모니아 수학왕국</title>
</head>
<body style="margin:0;padding:20px;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center">
<div style="max-width:580px;width:100%;font-family:'Noto Sans KR',sans-serif">

  <div style="font-size:.75rem;color:#94a3b8;margin-bottom:.5rem">
    📚 아르모니아 수학왕국 · 3단계 다항식 · poly-hard 3/4
  </div>

  <div style="display:inline-block;padding:.3rem .9rem;border-radius:999px;background:rgba(249,168,212,.07);border:1px solid rgba(249,168,212,.25);color:#f9a8d4;font-size:.8rem;font-weight:700;margin-bottom:.8rem">
    ⚡ 심화 3/4 — x¹⁰⁰−1 나누기
  </div>

  <div style="background:rgba(249,168,212,.07);border:1px solid rgba(249,168,212,.25);border-radius:16px;padding:1.4rem 1.6rem;line-height:1.85;font-size:.9rem">
    <div style="font-size:.88rem;color:#e2e8f0;line-height:1.8;font-weight:600">f(x) = x¹⁰⁰−1을 x²−x로 나눈 나머지를 구하여라.</div>
  </div>

  
  <details style="margin-top:1rem">
    <summary style="cursor:pointer;display:inline-block;padding:.6rem 1.6rem;background:linear-gradient(135deg,#86efac,#3b82f6);border:none;border-radius:999px;color:#0f172a;font-weight:700;font-size:.9rem;list-style:none">
      ✅ 정답 보기
    </summary>
    <div style="margin-top:.6rem;background:#0f172a;border:1px solid rgba(134,239,172,.2);border-radius:16px;padding:1.2rem 1.6rem;color:#e2e8f0;line-height:1.9;font-size:.9rem">
      <b style="color:#f9a8d4">토로:</b> "x²−x 인수분해하면?"<br>학생: "x(x−1)"<br><br><b style="color:#f9a8d4">토로:</b> "두 인수니까 나머지는 ax+b. x=0 대입?"<br>학생: "0−1=−1 → b=−1"<br><br><b style="color:#f9a8d4">토로:</b> "x=1 대입?"<br>학생: "1−1=0 → a+b=0 → a=1"<br><br><b style="color:#fde68a">답: x−1</b>
    </div>
  </details>

  <div style="margin-top:1rem;text-align:right;font-size:.75rem">
    <a href="https://choisuka.github.io/toro_math/" style="color:#7dd3fc;text-decoration:none">
      🏰 아르모니아 수학왕국 전체 보기 →
    </a>
  </div>

</div>
