</head>
<body style="margin:0;padding:20px;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center">
<div style="max-width:580px;width:100%;font-family:'Noto Sans KR',sans-serif">

  <div style="font-size:.75rem;color:#94a3b8;margin-bottom:.5rem">
    📚 아르모니아 수학왕국 · 4단계 통계 · avg-hard 3/3
  </div>

  <div style="display:inline-block;padding:.3rem .9rem;border-radius:999px;background:rgba(134,239,172,.07);border:1px solid rgba(134,239,172,.25);color:#86efac;font-size:.8rem;font-weight:700;margin-bottom:.8rem">
    🌱 기본 3/3 — 일주일 독서 평균
  </div>

  <div style="background:rgba(134,239,172,.07);border:1px solid rgba(134,239,172,.25);border-radius:16px;padding:1.4rem 1.6rem;line-height:1.85;font-size:.9rem">
    <div style="font-size:.88rem;color:#e2e8f0;line-height:1.8;font-weight:600">월요일부터 금요일까지 읽은 페이지 수: 5, 8, 6, 9, 7페이지입니다. 하루 평균 몇 페이지를 읽었나요?</div>
  </div>

  
  <details style="margin-top:1rem">
    <summary style="cursor:pointer;display:inline-block;padding:.6rem 1.6rem;background:linear-gradient(135deg,#86efac,#3b82f6);border:none;border-radius:999px;color:#0f172a;font-weight:700;font-size:.9rem;list-style:none">
      ✅ 정답 보기
    </summary>
    <div style="margin-top:.6rem;background:#0f172a;border:1px solid rgba(134,239,172,.2);border-radius:16px;padding:1.2rem 1.6rem;color:#e2e8f0;line-height:1.9;font-size:.9rem">
      <b style="color:#86efac">풀이:</b><br>합계 = 5 + 8 + 6 + 9 + 7 = 35<br>평균 = 35 ÷ 5 = <b style="color:#fde68a;font-size:.9rem">7페이지</b><br><br><b style="color:#7dd3fc">싱가포르 막대:</b> 길이 35인 막대를 5등분 → 한 조각 = 7
    </div>
  </details>

  <div style="margin-top:1rem;text-align:right;font-size:.75rem">
