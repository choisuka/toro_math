// 로컬스토리지에서 완료 상태 불러오기
const DONE_KEY = 'armoonia_blog_done';
let done = JSON.parse(localStorage.getItem(DONE_KEY) || '[]');

function toggleDone(idx) {
  if (done.includes(idx)) done = done.filter(i => i !== idx);
  else done.push(idx);
  localStorage.setItem(DONE_KEY, JSON.stringify(done));
  render();
}

function copyURL(url) {
  navigator.clipboard.writeText(url).then(() => {
    alert('URL 복사됨!');
  });
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  render(q);
}

function render(q = '') {
  const stages = [...new Set(CARDS.map(c => c.stage))];
  let html = '';
  let globalIdx = 0;
  stages.forEach(stage => {
    const stageCards = CARDS.filter(c => c.stage === stage);
    const filtered = stageCards.filter(c =>
      !q || c.stage.includes(q) || c.tag.includes(q) || c.file.includes(q)
    );
    if (!filtered.length) { globalIdx += stageCards.length; return; }
    html += `<div class="stage"><div class="stage-title">📌 ${stage}</div><div class="cards">`;
    stageCards.forEach((card, i) => {
      const idx = CARDS.indexOf(card);
      const url = BASE + encodeURIComponent(card.file);
      const isDone = done.includes(idx);
      if (!q || card.stage.includes(q) || card.tag.includes(q) || card.file.includes(q)) {
        html += `<a class="card-row${isDone?' done':''}" href="${url}" target="_blank">
          <span class="num">${String(idx+1).padStart(3,'0')}</span>
          <span>${card.tag}</span>
          <span class="tag">${card.file.replace('.html','')}</span>
          <button class="copy-btn" onclick="event.preventDefault();copyURL('${url}')">URL복사</button>
          <span class="check" onclick="event.preventDefault();toggleDone(${idx})">${isDone?'✅':'⬜'}</span>
        </a>`;
      }
    });
    html += `</div></div>`;
  });
  document.getElementById('list').innerHTML = html;
}

render();
